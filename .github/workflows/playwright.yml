name: Playwright E2E

on:
  workflow_dispatch:
    inputs:
      ux_runs:
        description: "Number of UX simulation batches (each = 7 personas × all screens)"
        required: false
        default: "1"
        type: choice
        options: ["1", "3", "6"]
      run_catalog:
        description: "Run screenshot catalog (captures all ~55 screens)"
        required: false
        default: false
        type: boolean
      run_growth_audit:
        description: "Run Business Model Growth Audit"
        required: false
        default: false
        type: boolean

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: npx playwright install --with-deps

      - name: Validate required secrets
        run: |
          if [ -z "$BASE_URL" ]; then echo "ERROR: BASE_URL secret is not set"; exit 1; fi
          if [ -z "$TEST_USER_EMAIL" ]; then echo "ERROR: TEST_USER_EMAIL secret is not set"; exit 1; fi
          if [ -z "$TEST_USER_PASSWORD" ]; then echo "ERROR: TEST_USER_PASSWORD secret is not set"; exit 1; fi
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Warm up preview URL (cold-start)
        run: |
          echo "Warming up $BASE_URL ..."
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$BASE_URL/auth" || echo "000")
            echo "  Attempt $i → HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Preview is warm ✓"
              # Hit a second page to warm the JS bundle cache
              curl -s -o /dev/null --max-time 30 "$BASE_URL/" || true
              sleep 5
              break
            fi
            sleep 15
          done
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_BYOC_TOKEN: ${{ secrets.TEST_BYOC_TOKEN }}

      - name: Run screenshot catalog
        if: success() && github.event.inputs.run_catalog == 'true'
        run: npm run test:catalog
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/

  # AI-powered reports run in a separate job with generous timeout
  # so the e2e job stays fast and artifacts are uploaded regardless
  ai-reports:
    needs: e2e
    if: success()
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Download test results from e2e job
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: test-results/

      - name: Generate Synthetic UX Report
        if: env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run ux-report

      - name: Generate UX Report Scaffold (no API key)
        if: env.ANTHROPIC_API_KEY == ''
        env:
          ANTHROPIC_API_KEY: ""
        run: npm run ux-report:dry

      - name: Generate Growth Audit
        if: github.event.inputs.run_growth_audit == 'true' && env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run growth-report

      - name: Generate Growth Audit Scaffold (no API key)
        if: github.event.inputs.run_growth_audit == 'true' && env.ANTHROPIC_API_KEY == ''
        env:
          ANTHROPIC_API_KEY: ""
        run: npm run growth-report:dry

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-reports
          path: |
            test-results/ux-review-report.md
            test-results/ux-review-scores.json
            test-results/growth-audit-report.md

  # Run additional UX simulation batches in parallel
  # Each batch = 7 personas × all screens (different randomness per run)
  ux-simulation:
    needs: e2e
    if: >
      success() &&
      github.event.inputs.ux_runs != '1'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        # Extra batches (e2e job already ran one)
        batch: [2, 3]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Download milestone screenshots from e2e job
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: test-results/

      - name: Run UX simulation batch ${{ matrix.batch }}
        if: env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run ux-report

      - name: Rename report with batch number
        run: |
          if [ -f test-results/ux-review-report.md ]; then
            mv test-results/ux-review-report.md "test-results/ux-review-report-batch-${{ matrix.batch }}.md"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ux-report-batch-${{ matrix.batch }}
          path: test-results/ux-review-report-batch-*.md
