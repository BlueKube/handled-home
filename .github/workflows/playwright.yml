name: Playwright E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: npx playwright install --with-deps

      - name: Validate required secrets
        run: |
          if [ -z "$BASE_URL" ]; then echo "ERROR: BASE_URL secret is not set"; exit 1; fi
          if [ -z "$TEST_USER_EMAIL" ]; then echo "ERROR: TEST_USER_EMAIL secret is not set"; exit 1; fi
          if [ -z "$TEST_USER_PASSWORD" ]; then echo "ERROR: TEST_USER_PASSWORD secret is not set"; exit 1; fi
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Warm up preview URL (cold-start)
        run: |
          echo "Warming up $BASE_URL ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$BASE_URL/auth" || echo "000")
            echo "  Attempt $i → HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Preview is warm ✓"
              break
            fi
            sleep 10
          done
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - run: npx playwright test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_BYOC_TOKEN: ${{ secrets.TEST_BYOC_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
