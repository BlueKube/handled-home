name: Regen Supabase types after migration

# Batch DX.1 — closes the recurring `as any` carry-over loop. When a push
# to main lands a new (or modified) migration under supabase/migrations/,
# regenerate src/integrations/supabase/types.ts and open a PR with the
# refreshed file.
#
# **Half-blocked**: needs SUPABASE_ACCESS_TOKEN in GH Secrets. Until that
# secret is set, the regenerate step exits early via the `if:` guard and
# the workflow is a no-op. See docs/upcoming/TODO.md "Set
# SUPABASE_ACCESS_TOKEN in GH Secrets" for the activation step.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Skip if SUPABASE_ACCESS_TOKEN not configured
        if: env.SUPABASE_ACCESS_TOKEN == ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          {
            echo "## Skipped — SUPABASE_ACCESS_TOKEN not configured"
            echo ""
            echo "This workflow ships dormant. To activate:"
            echo "1. Generate a Personal Access Token at https://supabase.com/dashboard/account/tokens"
            echo "2. Add it to GH Secrets as \`SUPABASE_ACCESS_TOKEN\`"
            echo "3. Re-run this workflow (or push another migration)"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Set up Node
        if: env.SUPABASE_ACCESS_TOKEN != ''
        uses: actions/setup-node@v4
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        with:
          node-version: "20"
          cache: npm

      - name: Install Supabase CLI
        if: env.SUPABASE_ACCESS_TOKEN != ''
        uses: supabase/setup-cli@v1
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        with:
          version: latest

      - name: Regenerate types
        if: env.SUPABASE_ACCESS_TOKEN != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: gwbwnetatpgnqgarkvht
        run: |
          # Capture stderr alongside stdout so any CLI failure is visible
          # in the runner log (the previous version redirected only stdout
          # to the .new file, hiding error messages on failure).
          set -o pipefail
          supabase --version
          supabase gen types typescript \
            --project-id "$PROJECT_REF" \
            2> >(tee /tmp/supabase-gen-types.err >&2) \
            > src/integrations/supabase/types.ts.new
          if [ ! -s src/integrations/supabase/types.ts.new ]; then
            echo "::error::supabase gen types produced an empty file. stderr was:"
            cat /tmp/supabase-gen-types.err || true
            exit 1
          fi
          mv src/integrations/supabase/types.ts.new src/integrations/supabase/types.ts

      - name: Open PR if types changed
        if: env.SUPABASE_ACCESS_TOKEN != ''
        uses: peter-evans/create-pull-request@v6
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        with:
          branch: chore/regen-supabase-types
          title: "chore: regen src/integrations/supabase/types.ts after migration"
          commit-message: "chore: regen Supabase types post-migration"
          body: |
            Auto-generated by `.github/workflows/regen-types.yml` after a migration landed on `main`.

            Run `npx tsc --noEmit` locally to confirm consumers still type-check, then merge. Closes the `as any` carry-over loop documented in CLAUDE.md §13 and lessons-learned.md.
          delete-branch: true
          add-paths: src/integrations/supabase/types.ts
